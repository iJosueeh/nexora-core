spring:
  application:
    name: nexora-core

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwtstarter}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false

  jackson:
    serialization:
      "[indent_output]": true

  graphql:
    graphiql:
      enabled: ${GRAPHQL_GRAPHIQL_ENABLED:true}

jwt:
  secret: ${JWT_SECRET:default-secret-key-at-least-32-characters-for-local-dev}
  refresh-secret: ${JWT_REFRESH_SECRET:default-refresh-secret-key-at-least-32-characters-for-local-dev}
  expiration: 900000
  refresh-expiration: 604800000

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  key: ${SUPABASE_KEY:your-anon-key}

server:
  port: 8080

logging:
  level:
    root: INFO
    "[org.springframework.security]": WARN
    "[org.hibernate.SQL]": WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] [%thread] %logger{36} - %msg%n"

app:
  docs:
    public-enabled: ${APP_DOCS_PUBLIC_ENABLED:false}
  graphql:
    public-enabled: ${APP_GRAPHQL_PUBLIC_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age: ${CORS_MAX_AGE:3600}